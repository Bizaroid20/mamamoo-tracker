<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAMAMOO — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── BASE ── */
:root {
  --bg: #0a0a0c;
  --surface: #13131a;
  --surface2: #1a1a24;
  --border: #252530;
  --text: #e8e8f0;
  --text-muted: #6b6b80;
  --text-dim: #32323e;
  --red: #e8324a;
  --red-bg: rgba(232,50,74,0.15);
  --violet-dark: #7b3fa8;
  --violet-dark-bg: rgba(123,63,168,0.15);
  --violet-light: #b06dd4;
  --violet-light-bg: rgba(176,109,212,0.15);
  --green-note: #2ea87a;
  --green-note-bg: rgba(46,168,122,0.15);
  --fav-star: #f0c040;
  /* artist accent — overridden per tab */
  --accent: #3dba7a;
  --accent-bg: rgba(61,186,122,0.12);
  --accent-glow: rgba(61,186,122,0.06);
}

/* ── ARTIST THEMES ── */
body.theme-mamamoo { --accent:#3dba7a; --accent-bg:rgba(61,186,122,0.12); --accent-glow:rgba(61,186,122,0.05); }
body.theme-solar    { --accent:#1a6fb5; --accent-bg:rgba(26,111,181,0.12); --accent-glow:rgba(26,111,181,0.05); }
body.theme-moonbyul { --accent:#d63a3a; --accent-bg:rgba(214,58,58,0.12);  --accent-glow:rgba(214,58,58,0.05); }
body.theme-wheein   { --accent:#c8c8d8; --accent-bg:rgba(200,200,216,0.10);--accent-glow:rgba(200,200,216,0.04); }
body.theme-hwasa    { --accent:#d4a020; --accent-bg:rgba(212,160,32,0.12); --accent-glow:rgba(212,160,32,0.05); }

* { box-sizing: border-box; margin:0; padding:0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  transition: background 0.3s;
}

/* ── AMBIENT GLOW ── */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transition: background 0.4s;
}

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  padding: 24px 40px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  background: rgba(10,10,12,0.95);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo-area { display:flex; align-items:center; gap:16px; }

/* MAMAMOO SVG logo */
.mamamoo-logo-svg {
  height: 48px;
  width: auto;
  opacity: 0.92;
  transition: opacity 0.2s;
}

.header-deco {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 8px;
  color: var(--accent);
  line-height: 1;
  transition: color 0.3s;
}
.header-sub {
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

/* decorative music notes */
.deco-notes {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-left: 16px;
  opacity: 0.2;
}
.deco-notes span {
  font-size: 22px;
  animation: float 3s ease-in-out infinite;
}
.deco-notes span:nth-child(2) { animation-delay: 0.5s; }
.deco-notes span:nth-child(3) { animation-delay: 1s; }
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.header-actions {
  margin-left: auto;
  display: flex;
  gap: 10px;
  align-items: center;
}

/* ── BUTTONS ── */
.btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 16px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #000; font-weight: 600; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
.btn-small { padding: 5px 10px; font-size: 10px; }

/* ── NAV TABS ── */
.nav {
  display: flex;
  padding: 0 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,12,0.9);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 97px;
  z-index: 99;
  overflow-x: auto;
}
.nav-tab {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 22px;
  color: var(--text-muted);
  cursor: pointer;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  white-space: nowrap;
  transition: all 0.15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
/* per-tab accent colors */
.nav-tab[data-id="mamamoo"].active { color:#3dba7a; border-bottom-color:#3dba7a; }
.nav-tab[data-id="solar"].active   { color:#4d9fd6; border-bottom-color:#4d9fd6; }
.nav-tab[data-id="moonbyul"].active{ color:#d63a3a; border-bottom-color:#d63a3a; }
.nav-tab[data-id="wheein"].active  { color:#c8c8d8; border-bottom-color:#c8c8d8; }
.nav-tab[data-id="hwasa"].active   { color:#d4a020; border-bottom-color:#d4a020; }

/* ── MAIN ── */
main { padding: 28px 40px; max-width: 1300px; position: relative; z-index: 1; }
.section { display: none; }
.section.active { display: block; }

/* ── ARTIST HEADER ── */
.artist-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.artist-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 5px;
  color: var(--accent);
  transition: color 0.3s;
}
.artist-count {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  background: var(--surface2);
  padding: 3px 8px;
  border-radius: 20px;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 12px 18px;
  margin-bottom: 20px;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  align-items: center;
}
.legend-item { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--text-muted); }
.legend-dot {
  width:28px; height:20px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:9px; font-weight:600;
}
.legend-sep { width:1px; height:16px; background:var(--border); }

/* ── ALBUM BLOCK ── */
.album-block {
  margin-bottom: 24px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.album-block:hover { border-color: rgba(255,255,255,0.1); }

.album-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  flex-wrap: wrap;
  gap: 8px;
}
.album-header:hover { background: var(--surface2); }

.collapse-icon {
  color: var(--text-muted);
  font-size: 14px;
  transition: transform 0.2s;
  min-width: 14px;
}
.album-block.collapsed .collapse-icon { transform: rotate(-90deg); }
.album-block.collapsed .album-body { display: none; }

.album-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 3px;
  flex: 1;
  min-width: 120px;
}
.album-type {
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 3px;
}
.album-type.ep     { border-color: var(--violet-light); color: var(--violet-light); }
.album-type.album  { border-color: var(--accent); color: var(--accent); }
.album-date {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.album-avg-badges { display:flex; gap:5px; align-items:center; }
.avg-badge {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  border-radius: 3px;
}
.album-actions { display:flex; gap:5px; margin-left:auto; }

/* ── TABLE ── */
.album-body { overflow-x: auto; }
table { width:100%; border-collapse:collapse; }
thead tr { background: var(--surface2); }
th {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 9px 14px;
  text-align: left;
  font-weight: 400;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th:nth-child(3), th:nth-child(4) { text-align:center; }
td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }

.track-num { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); min-width:24px; }
.track-name { font-size:13px; }
.track-name.fav { color:var(--fav-star); }
.track-name.fav::after { content:' ★'; font-size:10px; }

.note-cell { text-align:center; }
.note-pill {
  display:inline-block;
  font-family:'DM Mono',monospace;
  font-size:11px;
  font-weight:600;
  padding:3px 9px;
  border-radius:20px;
  min-width:48px;
  text-align:center;
}
.note-5   { background:var(--red-bg);          color:var(--red);          border:1px solid var(--red); }
.note-475 { background:var(--violet-dark-bg);  color:var(--violet-dark);  border:1px solid var(--violet-dark); }
.note-45  { background:var(--violet-light-bg); color:var(--violet-light); border:1px solid var(--violet-light); }
.note-4   { background:var(--green-note-bg);   color:var(--green-note);   border:1px solid var(--green-note); }
.note-low  { color:var(--text-muted); font-family:'DM Mono',monospace; font-size:11px; }
.note-empty{ color:var(--text-dim); font-size:11px; }

/* row actions */
.row-actions { opacity:0; display:flex; gap:4px; justify-content:flex-end; align-items:center; }
tr:hover .row-actions { opacity:1; }
.icon-btn {
  background:none; border:1px solid var(--border);
  color:var(--text-muted); border-radius:3px;
  padding:3px 7px; font-size:11px; cursor:pointer;
  transition:all 0.1s; white-space:nowrap;
}
.icon-btn:hover { border-color:var(--text-muted); color:var(--text); }
.icon-btn.del:hover { border-color:var(--red); color:var(--red); }

/* drag handle */
.drag-handle {
  cursor: grab;
  color: var(--text-dim);
  font-size: 14px;
  padding: 0 4px;
  user-select: none;
  opacity: 0;
  transition: opacity 0.1s;
}
tr:hover .drag-handle { opacity: 1; }
tr.dragging { opacity: 0.4; background: var(--surface2) !important; }
tr.drag-over { border-top: 2px solid var(--accent); }

/* global note row */
.global-note-row td { background:var(--surface2); border-top:1px solid var(--border); padding:9px 14px; }
.global-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; }

/* ── MODALS ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:999;
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:28px; width:460px; max-width:95vw;
}
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:21px; letter-spacing:3px; margin-bottom:18px; }
.form-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
.form-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:130px; }
.form-group label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); }
input[type="text"], input[type="number"], select {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:4px; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:13px; padding:8px 11px; outline:none; transition:border-color 0.15s;
}
input:focus, select:focus { border-color:var(--text-muted); }
select option { background:var(--surface2); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; right:24px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; padding:11px 18px; font-size:12px;
  color:var(--text); font-family:'DM Mono',monospace; letter-spacing:0.5px;
  z-index:9999; transform:translateY(16px); opacity:0;
  transition:all 0.2s; pointer-events:none;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:var(--green-note); }
.toast.error   { border-color:var(--red); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

@media (max-width:640px) {
  header { padding:16px 20px; }
  main { padding:16px 20px; }
  .nav { padding:0 20px; top:88px; }
  .mamamoo-logo-svg { height:36px; }
  .header-title { font-size:28px; }
  .deco-notes { display:none; }
}
</style>
</head>
<body class="theme-mamamoo">

<!-- ════════════════ HEADER ════════════════ -->
<header>

    <!-- MAMAMOO logo SVG (recreation stylisée) -->

<!-- ════════════════ NAV ════════════════ -->
<nav class="nav" id="mainNav"></nav>

<!-- ════════════════ CONTENT ════════════════ -->
<main id="mainContent"></main>

<!-- ════════════════ MODAL EDIT ════════════════ -->

        <input type="text" id="editName" placeholder="Titre de la piste">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">

        <select id="editSong">
          <option value="">—</option>
          <option value="5">5</option>
          <option value="4.75">4.75</option>

          <option value="4.25">4.25</option>
          <option value="4">4</option>
          <option value="3.75">3.75</option>
          <option value="3.5">3.5</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note Lyrics</label>
        <select id="editLyrics">
          <option value="">—</option>
          <option value="6">6 ✦ spécial</option>
          <option value="5">5</option>
          <option value="4.75">4.75</option>
          <option value="4.5">4.5</option>
          <option value="4.25">4.25</option>
          <option value="4">4</option>
          <option value="3.75">3.75</option>
          <option value="3.5">3.5</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ════════════════ MODAL ADD TRACK ════════════════ -->
<div class="modal-overlay" id="addTrackModal">
  <div class="modal">
    <div class="modal-title">Ajouter une piste</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Titre</label>
        <input type="text" id="newTrackName" placeholder="Titre de la piste">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Note Song</label>
        <select id="newTrackSong">
          <option value="">—</option>
          <option value="5">5</option>
          <option value="4.75">4.75</option>
          <option value="4.5">4.5</option>
          <option value="4.25">4.25</option>
          <option value="4">4</option>
          <option value="3.75">3.75</option>
          <option value="3.5">3.5</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note Lyrics</label>
        <select id="newTrackLyrics">
          <option value="">—</option>
          <option value="6">6 ✦ spécial</option>
          <option value="5">5</option>
          <option value="4.75">4.75</option>
          <option value="4.5">4.5</option>
          <option value="4.25">4.25</option>
          <option value="4">4</option>
          <option value="3.75">3.75</option>
          <option value="3.5">3.5</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddTrackModal()">Annuler</button>
      <button class="btn btn-primary" onclick="confirmAddTrack()">Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ═══════════════════════════════════════════
// ARTIST THEMES
// ═══════════════════════════════════════════

  moonbyul:{ theme:"theme-moonbyul",accent:"#d63a3a", label:"MOONBYUL"},
  wheein:  { theme:"theme-wheein",  accent:"#c8c8d8", label:"WHEEIN"  },
  hwasa:   { theme:"theme-hwasa",   accent:"#d4a020", label:"HWASA"   }
};

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════

          {name:"Break Up For You, Not Yet For Me [2013]",song:4,lyrics:4},{name:"I Do Me [2014]",song:4.25,lyrics:4},{name:"Boy Jump [2014]",song:4,lyrics:null},{name:"Pink Panties 'cover' [2014]",song:4.25,lyrics:4.5},{name:"Drinks Up [2015]",song:3.5,lyrics:3.5},{name:"Mileage [2015]",song:4,lyrics:4},{name:"Ice Ice - Hyuna [2015]",song:4,lyrics:null},{name:"Call Me [2015]",song:3.5,lyrics:4},{name:"Love Talk [2015]",song:4,lyrics:4},{name:"Ddang [2016]",song:4,lyrics:3.5},{name:"Nice [2016]",song:4.5,lyrics:4},{name:"HookGa [2016]",song:4.25,lyrics:4},{name:"Love Comes [2017]",song:4,lyrics:4},{name:"I Am Me [2017]",song:4,lyrics:4},{name:"Bang Bang Bang - MS [2017]",song:4.5,lyrics:null},{name:"Is Anybody Here ? - MS [2017]",song:4,lyrics:4},{name:"City Of Stars [2017]",song:4,lyrics:4.25},{name:"Bang Bang - Seulgi [2017]",song:4.25,lyrics:4},{name:"Whistling [2017]",song:4.25,lyrics:4.5},{name:"Don't [2018]",song:4,lyrics:4},{name:"Be Alright [2018]",song:4.5,lyrics:4},{name:"Cotton Candy [2018]",song:4.5,lyrics:4},{name:"Do Not Become Friendly [2018]",song:4.75,lyrics:4.5},{name:"Bohemian Rhapsody + We Will Rock You [2018]",song:4.75,lyrics:4},{name:"Twit [2019]",song:5,lyrics:4.5},{name:"When You Come To My Heart [2019]",song:4.5,lyrics:null},{name:"You Are Crying [2019]",song:4,lyrics:4},{name:"Fairy Of Shampoo [2019]",song:4.5,lyrics:4},{name:"Loving One Person [2019]",song:4.75,lyrics:4.25},{name:"Talk [2019]",song:5,lyrics:4}
        ]}
      ]
    }
  ]
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
var data;
var currentTab = "mamamoo";
var editTarget = null;
var addTrackTarget = null;
// drag state
var dragSrcAlbumId = null;
var dragSrcArtistId = null;
var dragSrcIndex = null;

function loadData() {
  try {
    var saved = localStorage.getItem("mamamoo_tracker_v3");
    data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultData));
  } catch(e) { data = JSON.parse(JSON.stringify(defaultData)); }
}
function saveData(silent) {
  try {
    localStorage.setItem("mamamoo_tracker_v3", JSON.stringify(data));
    if (!silent) showToast("Sauvegardé ✓", "success");
  } catch(e) { showToast("Erreur sauvegarde", "error"); }
}

// ═══════════════════════════════════════════
// NOTE HELPERS
// ═══════════════════════════════════════════
function getNoteClass(val) {
  if (val === null || val === undefined || val === "") return "note-empty";
  var n = parseFloat(val);
  if (n >= 5)    return "note-5";
  if (n >= 4.75) return "note-475";
  if (n >= 4.5)  return "note-45";
  if (n >= 4)    return "note-4";
  return "note-low";
}
function formatNote(val) {
  if (val === null || val === undefined || val === "") return "—";
  var n = parseFloat(val);
  return n === 6 ? "6 ✦" : String(n);
}
function isFav(lyrics) {
  return lyrics !== null && lyrics !== undefined && parseFloat(lyrics) >= 4.5;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() { renderNav(); renderContent(); applyTheme(currentTab); }

function applyTheme(id) {
  var body = document.body;
  body.className = "";
  body.classList.add("theme-" + id);
  var info = artistThemes[id] || artistThemes["mamamoo"];
  document.getElementById("headerTitle").textContent = info.label;
  document.getElementById("headerTitle").style.color = info.accent;
}

function renderNav() {
  var nav = document.getElementById("mainNav");
  var html = "";
  for (var i = 0; i < data.artists.length; i++) {
    var a = data.artists[i];
    html += '<button class="nav-tab' + (currentTab === a.id ? " active" : "") + '" data-id="' + a.id + '" onclick="switchTab(\'' + a.id + '\')">' + a.name + '</button>';
  }
  nav.innerHTML = html;
}

function renderContent() {
  var main = document.getElementById("mainContent");
  var html = "";
  for (var i = 0; i < data.artists.length; i++) {
    var artist = data.artists[i];
    html += '<div class="section' + (currentTab === artist.id ? " active" : "") + '" id="section-' + artist.id + '">';
    html += renderArtist(artist);
    html += '</div>';
  }
  main.innerHTML = html;
}

function renderArtist(artist) {
  var html = '<div class="artist-header">';
  html += '<span class="artist-name">' + artist.name + '</span>';
  html += '<span class="artist-count">' + artist.albums.length + ' releases</span>';
  html += '<div style="margin-left:auto"><button class="btn btn-ghost btn-small" onclick="addAlbum(\'' + artist.id + '\')">+ Nouvel album</button></div>';
  html += '</div>';
  html += '<div class="legend">';
  html += '<div class="legend-item"><div class="legend-dot note-5">5</div>Chef-d\'œuvre</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item"><div class="legend-dot note-475">4.75</div>Exceptionnel</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item"><div class="legend-dot note-45">4.5</div>Excellent</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item"><div class="legend-dot note-4">4</div>Très bien</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item" style="color:var(--fav-star)">★ Lyrics ≥ 4.5</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item" style="color:var(--text-muted);font-size:10px;">⠿ Glisser pour réordonner</div>';
  html += '</div>';
  for (var i = 0; i < artist.albums.length; i++) {
    html += renderAlbum(artist, artist.albums[i]);
  }
  return html;
}

function renderAlbum(artist, album) {
  var typeClass = album.type === "EP" ? "ep" : (album.type === "Album" ? "album" : "");
  var avgSongCls = getNoteClass(album.globalSong);
  var avgLyrCls  = getNoteClass(album.globalLyrics);

  var html = '<div class="album-block" id="album-' + album.id + '">';
  html += '<div class="album-header" onclick="toggleAlbum(\'' + album.id + '\')">';
  html += '<span class="collapse-icon">▾</span>';
  html += '<span class="album-title">' + album.title + '</span>';
  if (album.subtitle) html += '<span class="album-date" style="font-style:italic">' + album.subtitle + '</span>';
  html += '<span class="album-type ' + typeClass + '">' + album.type + '</span>';
  if (album.date) html += '<span class="album-date">' + album.date + '</span>';
  if (album.globalSong !== null && album.globalSong !== undefined) {
    html += '<div class="album-avg-badges"><span class="avg-badge ' + avgSongCls + '">' + formatNote(album.globalSong) + '</span>';
    if (album.globalLyrics !== null && album.globalLyrics !== undefined)
      html += '<span class="avg-badge ' + avgLyrCls + '" style="font-size:10px;opacity:0.8">' + formatNote(album.globalLyrics) + ' L</span>';
    html += '</div>';
  }
  html += '<div class="album-actions" onclick="event.stopPropagation()">';
  html += '<button class="icon-btn btn-small" onclick="editGlobalNote(\'' + artist.id + '\',\'' + album.id + '\')">∑ Global</button>';
  html += '<button class="icon-btn btn-small" onclick="openAddTrackModal(\'' + artist.id + '\',\'' + album.id + '\')">+ Piste</button>';
  html += '</div>';
  html += '</div>';

  html += '<div class="album-body"><table>';
  html += '<thead><tr><th style="width:20px"></th><th style="width:28px">#</th><th>TITRE</th><th>SONG</th><th>LYRICS</th><th></th></tr></thead>';
  html += '<tbody id="tbody-' + album.id + '">';

  for (var j = 0; j < album.tracks.length; j++) {
    html += renderTrackRow(artist.id, album.id, album.tracks[j], j);
  }

  if (album.globalSong !== null && album.globalSong !== undefined) {
    html += '<tr class="global-note-row">';
    html += '<td></td><td colspan="2"><span class="global-label">Note globale</span></td>';
    html += '<td class="note-cell"><span class="note-pill ' + avgSongCls + '">' + formatNote(album.globalSong) + '</span></td>';
    html += '<td class="note-cell">' + (album.globalLyrics !== null && album.globalLyrics !== undefined ? '<span class="note-pill ' + avgLyrCls + '">' + formatNote(album.globalLyrics) + '</span>' : '<span class="note-empty">—</span>') + '</td>';
    html += '<td></td></tr>';
  }

  html += '</tbody></table></div></div>';
  return html;
}

function renderTrackRow(artistId, albumId, t, j) {
  var fav = isFav(t.lyrics);
  var sCls = getNoteClass(t.song);
  var lCls = getNoteClass(t.lyrics);
  var html = '<tr draggable="true"';
  html += ' ondragstart="onDragStart(event,\'' + artistId + '\',\'' + albumId + '\',' + j + ')"';
  html += ' ondragover="onDragOver(event)"';
  html += ' ondragleave="onDragLeave(event)"';
  html += ' ondrop="onDrop(event,\'' + artistId + '\',\'' + albumId + '\',' + j + ')"';
  html += ' ondragend="onDragEnd(event)">';
  html += '<td><span class="drag-handle" title="Glisser pour réordonner">⠿</span></td>';
  html += '<td class="track-num">' + (j + 1) + '</td>';
  html += '<td class="track-name' + (fav ? " fav" : "") + '">' + escHtml(t.name) + '</td>';
  html += '<td class="note-cell">' + (t.song !== null && t.song !== undefined ? '<span class="note-pill ' + sCls + '">' + formatNote(t.song) + '</span>' : '<span class="note-empty">—</span>') + '</td>';
  html += '<td class="note-cell">' + (t.lyrics !== null && t.lyrics !== undefined ? '<span class="note-pill ' + lCls + '">' + formatNote(t.lyrics) + '</span>' : '<span class="note-empty">—</span>') + '</td>';
  html += '<td><div class="row-actions">';
  html += '<button class="icon-btn" onclick="openEditModal(\'' + artistId + '\',\'' + albumId + '\',' + j + ')">✎</button>';
  html += '<button class="icon-btn del" onclick="deleteTrack(\'' + artistId + '\',\'' + albumId + '\',' + j + ')">×</button>';
  html += '</div></td></tr>';
  return html;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ═══════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════
function onDragStart(e, artistId, albumId, idx) {
  dragSrcArtistId = artistId;
  dragSrcAlbumId  = albumId;
  dragSrcIndex    = idx;
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", idx);
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  var tr = e.currentTarget;
  // remove existing drag-over from siblings
  var tbody = tr.parentNode;
  var rows = tbody.querySelectorAll("tr");
  for (var i = 0; i < rows.length; i++) rows[i].classList.remove("drag-over");
  tr.classList.add("drag-over");
  return false;
}
function onDragLeave(e) {
  e.currentTarget.classList.remove("drag-over");
}
function onDrop(e, artistId, albumId, dropIdx) {
  e.stopPropagation();
  e.currentTarget.classList.remove("drag-over");
  if (dragSrcAlbumId !== albumId || dragSrcArtistId !== artistId) return;
  if (dragSrcIndex === dropIdx) return;
  var artist = getArtist(artistId);
  var album  = getAlbum(artist, albumId);
  var tracks = album.tracks;
  var moved  = tracks.splice(dragSrcIndex, 1)[0];
  tracks.splice(dropIdx, 0, moved);
  saveData(true);
  // only re-render the tbody for speed
  var tbody = document.getElementById("tbody-" + albumId);
  if (tbody) {
    var html = "";
    for (var i = 0; i < tracks.length; i++) {
      html += renderTrackRow(artistId, albumId, tracks[i], i);
    }
    // keep global note row if present
    var album2 = getAlbum(getArtist(artistId), albumId);
    if (album2.globalSong !== null && album2.globalSong !== undefined) {
      var avgSongCls = getNoteClass(album2.globalSong);
      var avgLyrCls  = getNoteClass(album2.globalLyrics);
      html += '<tr class="global-note-row"><td></td><td colspan="2"><span class="global-label">Note globale</span></td>';
      html += '<td class="note-cell"><span class="note-pill ' + avgSongCls + '">' + formatNote(album2.globalSong) + '</span></td>';
      html += '<td class="note-cell">' + (album2.globalLyrics !== null ? '<span class="note-pill ' + avgLyrCls + '">' + formatNote(album2.globalLyrics) + '</span>' : '<span class="note-empty">—</span>') + '</td><td></td></tr>';
    }
    tbody.innerHTML = html;
  }
  showToast("Ordre mis à jour ✓", "success");
  return false;
}
function onDragEnd(e) {
  e.currentTarget.classList.remove("dragging");
  var allRows = document.querySelectorAll("tr.drag-over");
  for (var i = 0; i < allRows.length; i++) allRows[i].classList.remove("drag-over");
  dragSrcAlbumId = null; dragSrcArtistId = null; dragSrcIndex = null;
}

// ═══════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════
function switchTab(id) {
  currentTab = id;
  applyTheme(id);
  renderNav();
  var sections = document.querySelectorAll(".section");
  for (var i = 0; i < sections.length; i++) sections[i].classList.remove("active");
  var el = document.getElementById("section-" + id);
  if (el) el.classList.add("active");
}

function toggleAlbum(albumId) {
  var el = document.getElementById("album-" + albumId);
  if (el) el.classList.toggle("collapsed");
}

function openEditModal(artistId, albumId, trackIndex) {
  editTarget = { artistId: artistId, albumId: albumId, trackIndex: trackIndex };
  var track = getAlbum(getArtist(artistId), albumId).tracks[trackIndex];
  document.getElementById("modalTitle").textContent = "Modifier : " + track.name;
  document.getElementById("editName").value = track.name;
  document.getElementById("editSong").value   = track.song   !== null && track.song   !== undefined ? track.song   : "";
  document.getElementById("editLyrics").value = track.lyrics !== null && track.lyrics !== undefined ? track.lyrics : "";
  document.getElementById("editModal").classList.add("open");
}
function closeModal() { document.getElementById("editModal").classList.remove("open"); editTarget = null; }
function saveEdit() {
  if (!editTarget) return;
  var track = getAlbum(getArtist(editTarget.artistId), editTarget.albumId).tracks[editTarget.trackIndex];
  track.name   = document.getElementById("editName").value;
  var s = document.getElementById("editSong").value;
  var l = document.getElementById("editLyrics").value;
  track.song   = s !== "" ? parseFloat(s) : null;
  track.lyrics = l !== "" ? parseFloat(l) : null;
  saveData();
  closeModal();
  renderContent();
}

function openAddTrackModal(artistId, albumId) {
  addTrackTarget = { artistId: artistId, albumId: albumId };
  document.getElementById("newTrackName").value   = "";
  document.getElementById("newTrackSong").value   = "";
  document.getElementById("newTrackLyrics").value = "";
  document.getElementById("addTrackModal").classList.add("open");
}
function closeAddTrackModal() { document.getElementById("addTrackModal").classList.remove("open"); addTrackTarget = null; }
function confirmAddTrack() {
  if (!addTrackTarget) return;
  var name = document.getElementById("newTrackName").value.trim();
  if (!name) { showToast("Titre requis", "error"); return; }
  var s = document.getElementById("newTrackSong").value;
  var l = document.getElementById("newTrackLyrics").value;
  getAlbum(getArtist(addTrackTarget.artistId), addTrackTarget.albumId).tracks.push({
    name: name,
    song:   s !== "" ? parseFloat(s) : null,
    lyrics: l !== "" ? parseFloat(l) : null
  });
  saveData();
  closeAddTrackModal();
  renderContent();
}

function deleteTrack(artistId, albumId, trackIndex) {
  if (!confirm("Supprimer cette piste ?")) return;
  getAlbum(getArtist(artistId), albumId).tracks.splice(trackIndex, 1);
  saveData();
  renderContent();
}

function editGlobalNote(artistId, albumId) {
  var album = getAlbum(getArtist(artistId), albumId);
  var s = prompt("Note globale SONG (vide = effacer) :", album.globalSong !== null && album.globalSong !== undefined ? album.globalSong : "");
  if (s === null) return;
  var l = prompt("Note globale LYRICS (vide = effacer) :", album.globalLyrics !== null && album.globalLyrics !== undefined ? album.globalLyrics : "");
  if (l === null) return;
  album.globalSong   = s !== "" ? parseFloat(s) : null;
  album.globalLyrics = l !== "" ? parseFloat(l) : null;
  saveData();
  renderContent();
}

function addAlbum(artistId) {
  var title = prompt("Titre de l'album :");
  if (!title) return;
  var type  = prompt("Type (EP / Album / Single / Hors) :", "EP");
  if (!type) return;
  var date  = prompt("Date :", "2024");
  var artist = getArtist(artistId);
  var id = artistId + "-" + title.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"") + "-" + Date.now();
  artist.albums.push({ id:id, title:title, type:type, date:date||"", globalSong:null, globalLyrics:null, tracks:[] });
  saveData();
  renderContent();
}

function exportData() {
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href   = url; a.download = "mamamoo-tracker.json"; a.click();
  URL.revokeObjectURL(url);
  showToast("Export téléchargé ✓", "success");
}
function importData() { document.getElementById("importFile").click(); }
function handleImport(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (!imported.artists) throw new Error();
      data = imported;
      localStorage.setItem("mamamoo_tracker_v3", JSON.stringify(data));
      render();
      showToast("Import réussi ✓", "success");
    } catch(err) { showToast("Fichier invalide", "error"); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function getArtist(id) { for (var i=0;i<data.artists.length;i++) if (data.artists[i].id===id) return data.artists[i]; return null; }
function getAlbum(artist, albumId) { for (var i=0;i<artist.albums.length;i++) if (artist.albums[i].id===albumId) return artist.albums[i]; return null; }

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + (type||"");
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

document.getElementById("editModal").addEventListener("click", function(e){ if(e.target===this) closeModal(); });
document.getElementById("addTrackModal").addEventListener("click", function(e){ if(e.target===this) closeAddTrackModal(); });

loadData();
render();
</script>
